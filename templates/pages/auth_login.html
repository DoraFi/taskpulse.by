<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskPulse — Вход</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/static/source/logo_rect.svg}" href="/static/source/logo_rect.svg">
    <link rel="stylesheet" th:href="@{/static/scss/style.css}" href="/static/scss/style.css">
</head>

<body class="auth-page auth-page--form">
    <header class="auth-page__header">
        <a th:href="@{/auth/welcome}" href="/auth/welcome" class="flex-row gap-24" style="align-items: center;">
            <img class="logo" th:src="@{/static/source/logo_rect.svg}" src="/static/source/logo_rect.svg" alt="TaskPulse">
        </a>
        <a class="text-basic" th:href="@{/auth/welcome}" href="/auth/welcome" style="text-decoration: underline;">← Назад</a>
    </header>

    <main class="auth-page__main auth-page__main--split" data-auth-parallax-root>
        <section class="auth-hero auth-hero--compact auth-hero--motif" aria-hidden="true">
            <div class="auth-hero__inner" data-auth-parallax="0.05">
                <p class="auth-hero__eyebrow">С возвращением</p>
                <h1 class="auth-hero__title">
                    <span class="auth-hero__title-line">Войдите</span>
                    <span class="auth-hero__title-line auth-hero__title-line--accent">в свой ритм.</span>
                </h1>
                <p class="auth-hero__lead text-basic">Один аккаунт — доски, таблицы и команда в одном потоке.</p>
                <div class="auth-motif auth-motif--login">
                    <div class="auth-motif-login">
                        <div class="auth-motif-login__orbit" aria-hidden="true"></div>
                        <div class="auth-motif-login__core">
                            <svg class="auth-motif-login__svg" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                                <path fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" d="M24 28 V22a8 8 0 0 1 16 0v6" />
                                <rect x="18" y="28" width="28" height="22" rx="4" fill="none" stroke="currentColor" stroke-width="2.2" />
                            </svg>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <div class="auth-page__panel">
        <div class="modal-content auth-flow-card auth-flow-card--signature">
            <div class="modal-header">
                <p class="text-header">Вход</p>
                <a class="modal-close" th:href="@{/auth/welcome}" href="/auth/welcome" aria-label="Закрыть">
                    <img src="/static/source/icons/cross.svg" alt="" width="24" height="24">
                </a>
            </div>
            <div class="modal-body">
                <form class="form-auth" data-static-form action="#" method="post" id="loginForm">
                    <div class="auth-field">
                        <label for="login-email">Электронная почта <img class="required-icon" src="/static/source/icons/required.svg" alt="" aria-hidden="true"></label>
                        <input id="login-email" name="email" type="email" autocomplete="username" placeholder="you@company.com" required>
                    </div>
                    <div class="auth-field">
                        <label for="login-password">Пароль <img class="required-icon" src="/static/source/icons/required.svg" alt="" aria-hidden="true"></label>
                        <input id="login-password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required>
                    </div>
                    <label class="checkbox-item" style="margin: 0;">
                        <input type="checkbox" name="remember">
                        <span class="custom-checkbox"></span>
                        <span class="checkbox-text">Запомнить меня на этом устройстве</span>
                    </label>
                </form>
            </div>
            <div class="modal-footer" style="flex-wrap: wrap; justify-content: space-between;">
                <div class="auth-link-row" style="margin: 0; width: 100%; justify-content: space-between;">
                    <a th:href="@{/auth/forgot}" href="/auth/forgot">Забыли пароль?</a>
                    <a th:href="@{/auth/register}" href="/auth/register">Нет аккаунта — зарегистрироваться</a>
                </div>
                <div style="display: flex; gap: 1rem; margin-left: auto;">
                    <a class="button-secondary" th:href="@{/auth/welcome}" href="/auth/welcome">Отмена</a>
                    <button class="button-basic" type="button" id="loginSubmitBtn">Войти</button>
                </div>
            </div>
        </div>
        </div>
    </main>

    <script th:src="@{/static/js/auth_static.js}" src="/static/js/auth_static.js"></script>
</body>

</html>
