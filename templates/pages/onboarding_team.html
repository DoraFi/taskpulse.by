<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskPulse — Команда проекта</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/static/source/logo_rect.svg}" href="/static/source/logo_rect.svg">
    <link rel="stylesheet" th:href="@{/static/scss/style.css}" href="/static/scss/style.css">
</head>

<body class="auth-page auth-page--form">
    <header class="auth-page__header">
        <a th:href="@{/auth/welcome}" href="/auth/welcome" class="flex-row gap-24" style="align-items: center;">
            <img class="logo" th:src="@{/static/source/logo_rect.svg}" src="/static/source/logo_rect.svg" alt="TaskPulse">
        </a>
        <span class="text-signature">Шаг 2 из 3</span>
    </header>

    <main class="auth-page__main auth-page__main--split" data-auth-parallax-root>
        <section class="auth-hero auth-hero--compact auth-hero--motif" aria-hidden="true">
            <div class="auth-hero__inner" data-auth-parallax="0.05">
                <p class="auth-hero__eyebrow">Шаг 2 — люди</p>
                <h1 class="auth-hero__title">
                    <span class="auth-hero__title-line">Пригласите</span>
                    <span class="auth-hero__title-line auth-hero__title-line--accent">команду в поток.</span>
                </h1>
                <p class="auth-hero__lead text-basic">Роли и письма — как в рабочем пространстве: все увидят одну доску.</p>
                <div class="auth-motif auth-motif--web">
                    <div class="auth-motif-web">
                        <svg class="auth-motif-web__svg" viewBox="27 27 146 70" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                            <path class="auth-motif-web__curve" d="M 36 68 C 52 52 76 44 100 40 C 124 44 148 52 164 68" fill="none" />
                            <path class="auth-motif-web__curve" d="M 100 40 Q 100 64 100 88" fill="none" />
                            <path class="auth-motif-web__curve" d="M 36 68 Q 68 78 100 88" fill="none" />
                            <path class="auth-motif-web__curve" d="M 164 68 Q 132 78 100 88" fill="none" />
                            <path class="auth-motif-web__curve" d="M 36 68 Q 100 56 164 68" fill="none" />
                            <circle class="auth-motif-web__node" cx="36" cy="68" r="7" />
                            <circle class="auth-motif-web__node auth-motif-web__node--primary" cx="100" cy="38" r="9" />
                            <circle class="auth-motif-web__node" cx="164" cy="68" r="7" />
                            <circle class="auth-motif-web__node" cx="100" cy="88" r="7" />                  </svg>
                    </div>
                </div>
            </div>
        </section>

        <div class="auth-page__panel">
        <div class="modal-content auth-flow-card auth-flow-card--signature">
            <div class="auth-page__steps auth-steps" style="--steps-total: 3; --step-index: 2;" aria-label="Прогресс: шаг 2 из 3">
                <div class="auth-steps__bar" aria-hidden="true">
                    <div class="auth-steps__fill"></div>
                </div>
            </div>
            <div class="modal-header" style="margin-top: 0;">
                <p class="text-header">Пригласите команду</p>
                <a class="modal-close" th:href="@{/onboarding/done}" href="/onboarding/done" aria-label="Пропустить приглашения" title="Пропустить">
                    <img src="/static/source/icons/cross.svg" alt="" width="24" height="24">
                </a>
            </div>
            <div class="modal-body">
                <p class="text-basic" style="margin: 0;">Добавьте email участников и роль. Можно отправить приглашения позже из приложения.</p>
                <form class="form-auth" data-static-form action="#" method="post">
                    <div class="auth-team-list">
                        <div class="auth-team-row">
                            <div class="auth-field" style="margin: 0;">
                                <label for="invite-1">Email</label>
                                <input id="invite-1" type="email" name="invites[]" placeholder="colleague@company.com">
                            </div>
                            <div class="auth-field" style="margin: 0;">
                                <label for="role-1">Роль</label>
                                <select id="role-1" name="roles[]">
                                    <option value="member">Участник</option>
                                    <option value="admin">Администратор</option>
                                    <option value="viewer">Наблюдатель</option>
                                </select>
                            </div>
                        </div>
                        <div class="auth-team-row">
                            <div class="auth-field" style="margin: 0;">
                                <label for="invite-2">Email</label>
                                <input id="invite-2" type="email" name="invites[]" placeholder="another@company.com">
                            </div>
                            <div class="auth-field" style="margin: 0;">
                                <label for="role-2">Роль</label>
                                <select id="role-2" name="roles[]">
                                    <option value="member">Участник</option>
                                    <option value="admin">Администратор</option>
                                    <option value="viewer">Наблюдатель</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <button type="button" class="button-secondary" id="add-invite-row" style="align-self: flex-start;">+ Добавить участника</button>
                    <div class="auth-field">
                        <label for="invite-message">Сообщение в приглашении</label>
                        <textarea id="invite-message" name="inviteMessage" rows="2" placeholder="Кратко опишите цели проекта для новых участников"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer" style="flex-wrap: wrap; gap: 1rem;">
                <a class="button-secondary" th:href="@{/onboarding/project}" href="/onboarding/project">Назад</a>
                <div style="display: flex; gap: 1rem; margin-left: auto;">
                    <a class="text-basic" th:href="@{/onboarding/done}" href="/onboarding/done" style="align-self: center; text-decoration: underline;">Пропустить</a>
                    <a class="button-basic" th:href="@{/onboarding/done}" href="/onboarding/done">Продолжить</a>
                </div>
            </div>
        </div>
        </div>
    </main>

    <script th:src="@{/static/js/auth_static.js}" src="/static/js/auth_static.js"></script>
</body>

</html>
