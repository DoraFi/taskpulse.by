<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskPulse — Готово</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/static/source/logo_rect.svg}" href="/static/source/logo_rect.svg">
    <link rel="stylesheet" th:href="@{/static/scss/style.css}" href="/static/scss/style.css">
</head>

<body class="auth-page auth-page--form">
    <header class="auth-page__header">
        <a th:href="@{/auth/welcome}" href="/auth/welcome" class="flex-row gap-24" style="align-items: center;">
            <img class="logo" th:src="@{/static/source/logo_rect.svg}" src="/static/source/logo_rect.svg" alt="TaskPulse">
        </a>
        <span class="text-signature">Шаг 4 из 4</span>
    </header>

    <main class="auth-page__main auth-page__main--split" data-auth-parallax-root>
        <section class="auth-hero auth-hero--compact" aria-hidden="true">
            <div class="auth-hero__orbit"></div>
            <div class="auth-hero__inner" data-auth-parallax="0.05">
                <p class="auth-hero__eyebrow">Шаг 4 — старт</p>
                <h1 class="auth-hero__title">
                    <span class="auth-hero__title-line">Проект в</span>
                    <span class="auth-hero__title-line auth-hero__title-line--accent">движении.</span>
                </h1>
                <p class="auth-hero__lead text-basic">Можно открыть доску или список — тот же пульс задач, что на главной.</p>
                <div class="auth-hero-success">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </div>
                <div class="auth-hero__pulse-wrap">
                    <svg class="auth-pulse-svg" viewBox="0 0 320 72" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <defs>
                            <linearGradient id="authPulseGradDone" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="currentColor" stop-opacity="0.35" />
                                <stop offset="50%" stop-color="currentColor" stop-opacity="0.95" />
                                <stop offset="100%" stop-color="currentColor" stop-opacity="0.35" />
                            </linearGradient>
                        </defs>
                        <path class="auth-pulse-svg__base" d="M0 36 H320" fill="none" stroke="url(#authPulseGradDone)" stroke-width="1.5" />
                        <path class="auth-pulse-svg__beat" d="M0 36 L320 36" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
                    </svg>
                </div>
            </div>
        </section>

        <div class="auth-page__panel">
        <div class="modal-content auth-flow-card auth-flow-card--signature">
            <div class="auth-page__steps auth-steps" style="--steps-total: 4; --step-index: 4;" aria-label="Прогресс: шаг 4 из 4">
                <div class="auth-steps__bar" aria-hidden="true">
                    <div class="auth-steps__fill"></div>
                </div>
            </div>
            <div class="modal-header" style="margin-top: 0;">
                <p class="text-header">Всё готово</p>
            </div>
            <div class="modal-body">
                <p class="text-basic" style="margin: 0;">Проект создан, приглашения можно дослать позже. Откройте рабочее пространство и выберите представление досок или таблицы.</p>
            </div>
            <div class="modal-footer">
                <a class="button-secondary" id="onboardingHomeLink" href="/auth/welcome">На главную сводку</a>
                <a class="button-basic" id="onboardingProjectLink" href="/auth/welcome">Открыть проект</a>
            </div>
        </div>
        </div>

    <script>
        (async function () {
            try {
                var cachedBase = sessionStorage.getItem('tpOnboardingBasePath');
                if (cachedBase) {
                    var cachedHome = document.getElementById('onboardingHomeLink');
                    if (cachedHome) cachedHome.href = cachedBase;
                    var cachedProject = document.getElementById('onboardingProjectLink');
                    if (cachedProject) cachedProject.href = cachedBase + '/projects';
                    sessionStorage.removeItem('tpOnboardingBasePath');
                    return;
                }
                return;
            } catch (_) {}
        })();
    </script>
    </main>

    <script th:src="@{/static/js/auth_static.js}" src="/static/js/auth_static.js"></script>
</body>

</html>
