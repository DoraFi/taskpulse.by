<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskPulse — Новый проект</title>
    <link rel="icon" type="image/svg+xml" href="/static/source/logo_rect.svg">
    <link rel="stylesheet" href="/static/scss/style.css">
</head>

<body class="auth-page auth-page--form">
    <header class="auth-page__header">
        <a href="/templates/pages/auth_welcome.html" class="flex-row gap-24" style="align-items: center;">
            <img class="logo" src="/static/source/logo_rect.svg" alt="TaskPulse">
        </a>
        <span class="text-signature">Шаг 1 из 3</span>
    </header>

    <main class="auth-page__main auth-page__main--split" data-auth-parallax-root>
        <section class="auth-hero auth-hero--compact auth-hero--motif" aria-hidden="true">
            <div class="auth-hero__inner" data-auth-parallax="0.05">
                <p class="auth-hero__eyebrow">Шаг 1 — пространство</p>
                <h1 class="auth-hero__title">
                    <span class="auth-hero__title-line">Имя проекта</span>
                    <span class="auth-hero__title-line auth-hero__title-line--accent">и его «пульс».</span>
                </h1>
                <p class="auth-hero__lead text-basic">Ключ и шаблон доски задают, как команда увидит очередь и этапы — как в вашем Kanban.</p>
                <div class="auth-motif auth-motif--board">
                    <div class="auth-motif-board">
                        <div class="auth-motif-board__col">
                            <span class="auth-motif-board__head">Очередь</span>
                            <div class="auth-motif-board__stick"></div>
                            <div class="auth-motif-board__stick auth-motif-board__stick--short"></div>
                        </div>
                        <div class="auth-motif-board__col">
                            <span class="auth-motif-board__head">В работе</span>
                            <div class="auth-motif-board__stick"></div>
                            <div class="auth-motif-board__stick"></div>
                        </div>
                        <div class="auth-motif-board__col">
                            <span class="auth-motif-board__head">Готово</span>
                            <div class="auth-motif-board__stick auth-motif-board__stick--short"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <div class="auth-page__panel">
        <div class="modal-content auth-flow-card auth-flow-card--signature">
            <div class="auth-page__steps auth-steps" style="--steps-total: 3; --step-index: 1;" aria-label="Прогресс: шаг 1 из 3">
                <div class="auth-steps__bar" aria-hidden="true">
                    <div class="auth-steps__fill"></div>
                </div>
            </div>
            <div class="modal-header" style="margin-top: 0;">
                <p class="text-header"> Создайте проект</p>
                <a class="modal-close" href="/templates/pages/index.html" aria-label="Пропустить и открыть приложение" title="Пропустить">
                    <img src="/static/source/icons/cross.svg" alt="" width="24" height="24">
                </a>
            </div>
            <div class="modal-body">
                <form class="form-auth" data-static-form action="#" method="post">
                    <div class="auth-field">
                        <label for="proj-name">Название проекта <img class="required-icon" src="/static/source/icons/required.svg" alt="" aria-hidden="true"></label>
                        <input id="proj-name" name="projectName" type="text" placeholder="Например, Корпоративный портал" required>
                    </div>
                    <div class="auth-field">
                        <label for="proj-key">Ключ проекта <span class="text-signature">(короткий код для ссылок)</span></label>
                        <input id="proj-key" name="projectKey" type="text" placeholder="PORTAL" maxlength="12" style="text-transform: uppercase;">
                    </div>
                    <div class="auth-field">
                        <label for="proj-desc">Описание</label>
                        <textarea id="proj-desc" name="description" rows="3" placeholder="Цели, сроки, контекст для команды"></textarea>
                    </div>
                    <div class="auth-field">
                        <label for="proj-template">Шаблон доски</label>
                        <select id="proj-template" name="template">
                            <option value="kanban">Kanban — Очередь / В работе / Готово</option>
                            <option value="scrum">Scrum — бэклог и спринты</option>
                            <option value="empty">Пустой проект</option>
                        </select>
                    </div>
                    <div class="auth-field">
                        <label for="proj-visibility">Видимость</label>
                        <select id="proj-visibility" name="visibility">
                            <option value="private">Только приглашённые</option>
                            <option value="org">Вся организация</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <a class="button-secondary" href="/templates/pages/auth_login.html">Назад</a>
                <a class="button-basic" href="/templates/pages/onboarding_team.html">Далее: команда</a>
            </div>
        </div>
        </div>
    </main>

    <script src="/static/js/auth_static.js"></script>
</body>

</html>
