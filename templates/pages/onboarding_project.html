<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskPulse — Новый проект</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/static/source/logo_rect.svg}" href="/static/source/logo_rect.svg">
    <link rel="stylesheet" th:href="@{/static/scss/style.css}" href="/static/scss/style.css">
    <style>
        .project-type-field {
            cursor: pointer;
            background: #ffffff;
        }
        .project-type-picker {
            position: fixed;
            inset: 0;
            background: rgba(20, 27, 16, 0.52);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            z-index: 1200;
        }
        .project-type-picker[aria-hidden="false"] {
            display: flex;
        }
        .project-type-picker__dialog {
            width: min(1100px, 96vw);
            min-height: min(760px, 92vh);
            max-height: 92vh;
            background: #f6fbf2;
            border: 1px solid #dbe6d3;
            border-radius: 18px;
            box-shadow: 0 24px 40px rgba(36, 46, 31, 0.2);
            display: grid;
            grid-template-rows: auto 1fr;
            overflow: hidden;
        }
        .project-type-picker__head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            padding: 1.25rem 1.5rem 0.75rem;
            border-bottom: 1px solid #dbe6d3;
        }
        .project-type-picker__close {
            border: none;
            background: transparent;
            padding: 0;
            margin: 0;
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0.78;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        .project-type-picker__close:hover {
            opacity: 1;
            transform: scale(1.05);
        }
        .project-type-picker__body {
            padding: 1rem 1.5rem 1.5rem;
        }
        .project-type-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 1rem;
        }
        .project-type-card {
            width: 100%;
            background: #ffffff;
            border: 1px solid #dbe6d3;
            border-radius: 14px;
            padding: 1rem;
            text-align: left;
            cursor: pointer;
            display: grid;
            gap: 0.75rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
        }
        .project-type-card:hover {
            border-color: #61a039;
            box-shadow: 0 8px 20px rgba(97, 160, 57, 0.16);
            transform: translateY(-1px);
        }
        .project-type-card__image {
            height: 170px;
            border-radius: 10px;
            border: 1px solid #dbe6d3;
            background: linear-gradient(160deg, #eef7e6 0%, #dff0cc 100%);
            position: relative;
            overflow: hidden;
            padding: 8px;
        }
        .project-type-card__image::before {
            content: "";
            position: absolute;
            inset: 14px;
            border-radius: 8px;
            border: 1px dashed rgba(97, 160, 57, 0.6);
        }
        .project-type-mini {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            border-radius: 8px;
            background: #f6fbf2;
            border: 1px solid #dbe6d3;
            overflow: hidden;
        }
        .project-type-mini--list {
            display: grid;
            grid-template-rows: 24px 1fr;
        }
        .mini-list-head {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr 0.8fr 0.7fr;
            gap: 4px;
            padding: 4px 6px;
            border-bottom: 1px solid #dbe6d3;
            background: #eef7e6;
        }
        .mini-list-head span {
            display: block;
            height: 5px;
            border-radius: 3px;
            background: #9bbd82;
        }
        .mini-list-body {
            padding: 6px;
            display: grid;
            gap: 5px;
        }
        .mini-list-row {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr 0.8fr 0.7fr;
            gap: 4px;
            align-items: center;
            background: #ffffff;
            border: 1px solid #e0ebd5;
            border-radius: 5px;
            padding: 4px;
        }
        .mini-list-row span {
            display: block;
            height: 4px;
            border-radius: 3px;
            background: #c6dbb3;
        }
        .mini-list-row span:last-child {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #7fb363;
            justify-self: end;
        }
        .project-type-mini--kanban {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            padding: 6px;
        }
        .mini-kanban-col {
            background: #edf5e4;
            border: 1px solid #d8e8c8;
            border-radius: 6px;
            padding: 4px;
            display: grid;
            grid-template-rows: 10px 1fr;
            gap: 4px;
        }
        .mini-kanban-col span {
            display: block;
            height: 4px;
            border-radius: 3px;
            background: #7fb363;
        }
        .mini-kanban-stack {
            display: grid;
            gap: 4px;
            align-content: start;
        }
        .mini-kanban-card {
            height: 18px;
            border-radius: 4px;
            background: #ffffff;
            border: 1px solid #d4e5c3;
        }
        .project-type-mini--scrum {
            display: grid;
            grid-template-columns: 0.95fr 1.15fr;
            gap: 6px;
            padding: 6px;
        }
        .mini-scrum-backlog,
        .mini-scrum-sprint {
            background: #edf5e4;
            border: 1px solid #d8e8c8;
            border-radius: 6px;
            padding: 4px;
            display: grid;
            grid-template-rows: 10px 1fr;
            gap: 4px;
        }
        .mini-scrum-backlog > span,
        .mini-scrum-sprint > span {
            display: block;
            height: 4px;
            border-radius: 3px;
            background: #7fb363;
        }
        .mini-scrum-list {
            display: grid;
            gap: 4px;
            align-content: start;
        }
        .mini-scrum-item {
            height: 16px;
            border-radius: 4px;
            background: #ffffff;
            border: 1px solid #d4e5c3;
        }
        .mini-scrum-footer {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
        }
        .mini-scrum-footer div {
            height: 14px;
            border-radius: 4px;
            background: #ffffff;
            border: 1px solid #d4e5c3;
        }
        .project-type-mini--scrumban {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            padding: 6px;
        }
        .mini-scrumban-col {
            background: #edf5e4;
            border: 1px solid #d8e8c8;
            border-radius: 6px;
            padding: 4px;
            display: grid;
            grid-template-rows: 10px 1fr auto;
            gap: 4px;
        }
        .mini-scrumban-col > span {
            display: block;
            height: 4px;
            border-radius: 3px;
            background: #7fb363;
        }
        .mini-scrumban-stack {
            display: grid;
            gap: 4px;
            align-content: start;
        }
        .mini-scrumban-card {
            height: 16px;
            border-radius: 4px;
            background: #ffffff;
            border: 1px solid #d4e5c3;
            position: relative;
        }
        .mini-scrumban-card--urgent::after {
            content: "";
            position: absolute;
            right: 3px;
            top: 3px;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #d95050;
        }
        .mini-scrumban-wip {
            height: 8px;
            border-radius: 4px;
            background: rgba(217, 80, 80, 0.2);
            border: 1px solid rgba(217, 80, 80, 0.35);
        }
        .project-type-card__image[data-type="list"]::after {
            content: "Мини-реестр задач";
            position: absolute;
            left: 20px;
            bottom: 16px;
            color: #4c6e35;
            font-size: 0.78rem;
        }
        .project-type-card__image[data-type="kanban"]::after {
            content: "Мини-kanban поток";
            position: absolute;
            left: 20px;
            bottom: 16px;
            color: #4c6e35;
            font-size: 0.78rem;
        }
        .project-type-card__image[data-type="scrum"]::after {
            content: "Мини-scrum цикл";
            position: absolute;
            left: 20px;
            bottom: 16px;
            color: #4c6e35;
            font-size: 0.78rem;
        }
        .project-type-card__image[data-type="scrumban"]::after {
            content: "Мини-scrumban гибрид";
            position: absolute;
            left: 20px;
            bottom: 16px;
            color: #4c6e35;
            font-size: 0.78rem;
        }
        .project-type-card__title {
            margin: 0;
            font-size: 1.05rem;
            color: #23331a;
            font-weight: 600;
        }
        .project-type-card__text {
            display: grid;
            gap: 0.2rem;
        }
    </style>
</head>

<body class="auth-page auth-page--form">
    <header class="auth-page__header">
        <a th:href="@{/auth/welcome}" href="/auth/welcome" class="flex-row gap-24" style="align-items: center;">
            <img class="logo" th:src="@{/static/source/logo_rect.svg}" src="/static/source/logo_rect.svg"
                alt="TaskPulse">
        </a>
        <span class="text-signature">Шаг 1 из 3</span>
    </header>

    <main class="auth-page__main auth-page__main--split" data-auth-parallax-root>
        <section class="auth-hero auth-hero--compact auth-hero--motif" aria-hidden="true">
            <div class="auth-hero__inner" data-auth-parallax="0.05">
                <p class="auth-hero__eyebrow">Шаг 1 — пространство</p>
                <h1 class="auth-hero__title">
                    <span class="auth-hero__title-line">Имя проекта</span>
                    <span class="auth-hero__title-line auth-hero__title-line--accent">и его «пульс».</span>
                </h1>
                <p class="auth-hero__lead text-basic">Ключ и шаблон доски задают, как команда увидит очередь и этапы —
                    как в вашем Kanban.</p>
                <div class="auth-motif auth-motif--board">
                    <div class="auth-motif-board">
                        <div class="auth-motif-board__col">
                            <span class="auth-motif-board__head">Очередь</span>
                            <div class="auth-motif-board__stick"></div>
                            <div class="auth-motif-board__stick auth-motif-board__stick--short"></div>
                        </div>
                        <div class="auth-motif-board__col">
                            <span class="auth-motif-board__head">В работе</span>
                            <div class="auth-motif-board__stick"></div>
                            <div class="auth-motif-board__stick"></div>
                        </div>
                        <div class="auth-motif-board__col">
                            <span class="auth-motif-board__head">Готово</span>
                            <div class="auth-motif-board__stick auth-motif-board__stick--short"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <div class="auth-page__panel">
            <div class="modal-content auth-flow-card auth-flow-card--signature">
                <div class="auth-page__steps auth-steps" style="--steps-total: 3; --step-index: 1;"
                    aria-label="Прогресс: шаг 1 из 3">
                    <div class="auth-steps__bar" aria-hidden="true">
                        <div class="auth-steps__fill"></div>
                    </div>
                </div>
                <div class="modal-header" style="margin-top: 0;">
                    <p class="text-header"> Создайте проект</p>
                    <a class="modal-close" th:href="@{/auth/welcome}" href="/auth/welcome"
                        aria-label="Пропустить и открыть приложение" title="Пропустить">
                        <img src="/static/source/icons/cross.svg" alt="" width="24" height="24">
                    </a>
                </div>
                <div class="modal-body">
                    <form class="form-auth" data-static-form action="#" method="post">
                        <div class="auth-field">
                            <label for="proj-name">Название проекта <img class="required-icon"
                                    src="/static/source/icons/required.svg" alt="" aria-hidden="true"></label>
                            <input id="proj-name" name="projectName" type="text"
                                placeholder="Например, Корпоративный портал" required>
                        </div>
                        <div class="auth-field">
                            <label for="proj-key">Ключ проекта <span class="text-signature">(короткий код для
                                    ссылок)</span></label>
                            <input id="proj-key" name="projectKey" type="text" placeholder="PORTAL" maxlength="12"
                                style="text-transform: uppercase;">
                        </div>
                        <div class="auth-field">
                            <label for="proj-desc">Описание</label>
                            <textarea id="proj-desc" name="description" rows="3"
                                placeholder="Цели, сроки, контекст для команды"></textarea>
                        </div>
                        <div class="auth-field">
                            <label for="proj-template-display">Тип проекта</label>
                            <input id="proj-template-display" class="project-type-field" type="text" value="Kanban" readonly aria-haspopup="dialog" aria-controls="projectTypePicker" tabindex="0">
                            <input id="proj-template" name="template" type="hidden" value="kanban">
                        </div>
                        <div class="auth-field">
                            <label for="proj-visibility">Видимость</label>
                            <select id="proj-visibility" name="visibility">
                                <option value="private">Только приглашённые</option>
                                <option value="org">Вся организация</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <a class="button-secondary" th:href="@{/auth/login}" href="/auth/login">Назад</a>
                    <a class="button-basic" th:href="@{/onboarding/team}" href="/onboarding/team">Далее: команда</a>
                </div>
            </div>
        </div>
    </main>

    <div class="project-type-picker" id="projectTypePicker" aria-hidden="true">
        <section class="project-type-picker__dialog" role="dialog" aria-modal="true" aria-labelledby="projectTypePickerTitle">
            <header class="project-type-picker__head">
                <div>
                    <p id="projectTypePickerTitle" class="text-header">Выберите тип проекта</p>
                </div>
                <button type="button" class="project-type-picker__close" id="projectTypePickerClose" aria-label="Закрыть выбор типа проекта">
                    <img src="/static/source/icons/cross.svg" alt="" width="24" height="24">
                </button>
            </header>
            <div class="project-type-picker__body">
                <div class="project-type-grid">
                    <button type="button" class="project-type-card" data-template-value="list">
                        <div class="project-type-card__image" data-type="list">
                            <div class="project-type-mini project-type-mini--list">
                                <div class="mini-list-head">
                                    <span></span><span></span><span></span><span></span>
                                </div>
                                <div class="mini-list-body">
                                    <div class="mini-list-row"><span></span><span></span><span></span><span></span></div>
                                    <div class="mini-list-row"><span></span><span></span><span></span><span></span></div>
                                    <div class="mini-list-row"><span></span><span></span><span></span><span></span></div>
                                </div>
                            </div>
                        </div>
                        <div class="project-type-card__text">
                            <p class="project-type-card__title">Список</p>
                            <p class="text-basic">Подходит для реестра обращений: карточки в виде записей таблицы, фильтры, приоритеты, SLA, сроки и исполнители.</p>
                        </div>
                    </button>
                    <button type="button" class="project-type-card" data-template-value="kanban">
                        <div class="project-type-card__image" data-type="kanban">
                            <div class="project-type-mini project-type-mini--kanban">
                                <div class="mini-kanban-col">
                                    <span></span>
                                    <div class="mini-kanban-stack">
                                        <div class="mini-kanban-card"></div>
                                        <div class="mini-kanban-card"></div>
                                    </div>
                                </div>
                                <div class="mini-kanban-col">
                                    <span></span>
                                    <div class="mini-kanban-stack">
                                        <div class="mini-kanban-card"></div>
                                        <div class="mini-kanban-card"></div>
                                        <div class="mini-kanban-card"></div>
                                    </div>
                                </div>
                                <div class="mini-kanban-col">
                                    <span></span>
                                    <div class="mini-kanban-stack">
                                        <div class="mini-kanban-card"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="project-type-card__text">
                            <p class="project-type-card__title">Kanban</p>
                            <p class="text-basic">Непрерывный flow задач. Команда видит загрузку по колонкам, WIP-ограничения и узкие места в процессе.</p>
                        </div>
                    </button>
                    <button type="button" class="project-type-card" data-template-value="scrum">
                        <div class="project-type-card__image" data-type="scrum">
                            <div class="project-type-mini project-type-mini--scrum">
                                <div class="mini-scrum-backlog">
                                    <span></span>
                                    <div class="mini-scrum-list">
                                        <div class="mini-scrum-item"></div>
                                        <div class="mini-scrum-item"></div>
                                        <div class="mini-scrum-item"></div>
                                    </div>
                                </div>
                                <div class="mini-scrum-sprint">
                                    <span></span>
                                    <div class="mini-scrum-list">
                                        <div class="mini-scrum-item"></div>
                                        <div class="mini-scrum-item"></div>
                                    </div>
                                </div>
                                <div class="mini-scrum-footer">
                                    <div></div><div></div><div></div>
                                </div>
                            </div>
                        </div>
                        <div class="project-type-card__text">
                            <p class="project-type-card__title">Scrum</p>
                            <p class="text-basic">Итерационный режим: бэклог, планирование спринта, цель, демо и ретро. Удобно для предсказуемых релизов.</p>
                        </div>
                    </button>
                    <button type="button" class="project-type-card" data-template-value="scrumban">
                        <div class="project-type-card__image" data-type="scrumban">
                            <div class="project-type-mini project-type-mini--scrumban">
                                <div class="mini-scrumban-col">
                                    <span></span>
                                    <div class="mini-scrumban-stack">
                                        <div class="mini-scrumban-card"></div>
                                        <div class="mini-scrumban-card mini-scrumban-card--urgent"></div>
                                    </div>
                                    <div class="mini-scrumban-wip"></div>
                                </div>
                                <div class="mini-scrumban-col">
                                    <span></span>
                                    <div class="mini-scrumban-stack">
                                        <div class="mini-scrumban-card"></div>
                                        <div class="mini-scrumban-card"></div>
                                        <div class="mini-scrumban-card mini-scrumban-card--urgent"></div>
                                    </div>
                                    <div class="mini-scrumban-wip"></div>
                                </div>
                                <div class="mini-scrumban-col">
                                    <span></span>
                                    <div class="mini-scrumban-stack">
                                        <div class="mini-scrumban-card"></div>
                                    </div>
                                    <div class="mini-scrumban-wip"></div>
                                </div>
                            </div>
                        </div>
                        <div class="project-type-card__text">
                            <p class="project-type-card__title">Scrumban</p>
                            <p class="text-basic">Гибрид Scrum и Kanban: планирование блоками плюс обработка срочных инцидентов без срыва всего цикла.</p>
                        </div>
                    </button>
                </div>
            </div>
        </section>
    </div>

    <script th:src="@{/static/js/auth_static.js}" src="/static/js/auth_static.js"></script>
    <script>
        (function() {
            const picker = document.getElementById('projectTypePicker');
            const closeBtn = document.getElementById('projectTypePickerClose');
            const templateInput = document.getElementById('proj-template');
            const templateDisplay = document.getElementById('proj-template-display');
            if (!picker || !closeBtn || !templateInput || !templateDisplay) return;
            const labels = {
                list: 'Список',
                kanban: 'Kanban',
                scrum: 'Scrum',
                scrumban: 'Scrumban'
            };

            function openPicker() {
                picker.setAttribute('aria-hidden', 'false');
            }

            function closePicker() {
                picker.setAttribute('aria-hidden', 'true');
            }

            templateDisplay.addEventListener('click', openPicker);
            templateDisplay.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    openPicker();
                }
            });
            closeBtn.addEventListener('click', closePicker);

            picker.addEventListener('click', (e) => {
                if (e.target === picker) closePicker();
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && picker.getAttribute('aria-hidden') === 'false') {
                    closePicker();
                }
            });

            picker.querySelectorAll('.project-type-card').forEach((card) => {
                card.addEventListener('click', () => {
                    const value = card.dataset.templateValue;
                    if (!value) return;
                    templateInput.value = value;
                    templateDisplay.value = labels[value] || value;
                    closePicker();
                });
            });
        })();
    </script>
</body>

</html>
