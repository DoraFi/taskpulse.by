<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>TaskPulse — Проекты</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/static/source/logo_rect.svg}" href="/static/source/logo_rect.svg">
    <link rel="stylesheet" th:href="@{/static/scss/style.css}" href="/static/scss/style.css">
</head>

<body>
    <div class="header">
        <div class="gap-24 flex-row">
            <a th:href="@{/}" href="/"><img class="logo" th:src="@{/static/source/logo_rect.svg}" src="/static/source/logo_rect.svg" alt="TaskPulse"></a>
            <div class="search-panel border-dark-1 br-5">
                <img class="h-16" th:src="@{/static/source/icons/search.svg}" src="/static/source/icons/search.svg" alt="Поиск">
                <input class="text-basic" type="text" placeholder="Поиск">
            </div>
        </div>
        <ul class="gap-24 flex-row header-toolbar">
            <li>
                <button type="button" class="header-toolbar__action" id="headerCreateTaskBtn" aria-label="Создать">
                    <img class="h-32" th:src="@{/static/source/icons/plus.svg}" src="/static/source/icons/plus.svg" alt="">
                </button>
            </li>
            <li>
                <button type="button" class="header-toolbar__action" id="headerSettingsBtn" aria-label="Настройки">
                    <img class="h-32" th:src="@{/static/source/icons/settings.svg}" src="/static/source/icons/settings.svg" alt="">
                </button>
            </li>
            <li>
                <button type="button" class="header-toolbar__action" id="headerProfileBtn" aria-label="Профиль">
                    <img class="h-32" th:src="@{/static/source/icons/profile.svg}" src="/static/source/icons/profile.svg" alt="">
                </button>
            </li>
            <li>
                <a th:href="@{/auth/welcome}" href="/auth/welcome" class="header-toolbar__action" aria-label="Выйти">
                    <img class="h-32" th:src="@{/static/source/icons/logout.svg}" src="/static/source/icons/logout.svg" alt="">
                </a>
            </li>
            <li>
                <button type="button" class="theme-toggle header-toolbar__action" id="themeToggle" aria-label="Переключить тему">
                    <img class="h-32 theme-toggle__icon" th:src="@{/static/source/icons/lighttheme.svg}" src="/static/source/icons/lighttheme.svg" alt="" aria-hidden="true">
                </button>
            </li>
        </ul>
    </div>

    <div class="main-layout">
        <aside id="aside-container"></aside>

        <div class="app-container flex-col">
            <div class="projects-grid">
                <a class="project-card project-card--kanban" th:href="@{/kanban}" href="/kanban" aria-label="Открыть проект Kanban">
                    <div class="project-card__body">
                        <div class="project-card__head">
                            <div class="project-card__icon" aria-hidden="true">K</div>
                            <div class="project-card__titles">
                                <p class="text-header project-card__title">TaskPulse — Диплом</p>
                                <p class="text-signature project-card__subtitle">Kanban · доски и этапы</p>
                            </div>
                            <span class="project-card__chip text-signature">Активен</span>
                        </div>

                        <p class="text-signature project-card__desc">Планирование, распределение задач и контроль прогресса для
                            подготовки диплома.</p>

                        <div class="project-card__stats">
                            <div class="project-card__stat">
                                <span class="text-signature">Команда</span>
                                <span class="text-basic">5</span>
                            </div>
                            <div class="project-card__stat">
                                <span class="text-signature">Доски</span>
                                <span class="text-basic">3</span>
                            </div>
                            <div class="project-card__stat">
                                <span class="text-signature">Этапы</span>
                                <span class="text-basic">3–4</span>
                            </div>
                            <div class="project-card__stat">
                                <span class="text-signature">Фокус</span>
                                <span class="text-basic">релизы</span>
                            </div>
                        </div>

                        <div class="project-card__footer">
                            <button class="button-basic">Открыть проект</button>
                        </div>
                    </div>
                </a>

                <a class="project-card project-card--list" th:href="@{/boards}" href="/boards" aria-label="Открыть проект Список">
                    <div class="project-card__body">
                        <div class="project-card__head">
                            <div class="project-card__icon" aria-hidden="true">L</div>
                            <div class="project-card__titles">
                                <p class="text-header project-card__title">Личный список</p>
                                <p class="text-signature project-card__subtitle">List · таблицы и колонки</p>
                            </div>
                            <span class="project-card__chip text-signature">Активен</span>
                        </div>

                        <p class="text-signature project-card__desc">Планирование дня</p>

                        <div class="project-card__stats">
                            <div class="project-card__stat">
                                <span class="text-signature">Колонки</span>
                                <span class="text-basic">гибкие</span>
                            </div>
                            <div class="project-card__stat">
                                <span class="text-signature">Доски</span>
                                <span class="text-basic">4</span>
                            </div>
                            <div class="project-card__stat">
                                <span class="text-signature">Архив</span>
                                <span class="text-basic">включён</span>
                            </div>
                            <div class="project-card__stat">
                                <span class="text-signature">Фокус</span>
                                <span class="text-basic">контроль</span>
                            </div>
                        </div>

                        <div class="project-card__footer">
                            <button class="button-basic">Открыть проект</button>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <script src="/static/js/loadComponents.js"></script>
    <script src="/static/js/app.js"></script>
    <script src="/static/js/theme.js"></script>
    <script src="/static/js/create_task_modal.js"></script>
    <script src="/static/js/profile_modal.js"></script>
    <script src="/static/js/settings_modal.js"></script>
    <script src="/static/js/projects.js"></script>
</body>

</html>
