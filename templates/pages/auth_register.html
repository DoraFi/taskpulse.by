<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskPulse — Регистрация</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/static/source/logo_rect.svg}" href="/static/source/logo_rect.svg">
    <link rel="stylesheet" th:href="@{/static/scss/style.css}" href="/static/scss/style.css">
</head>

<body class="auth-page auth-page--form">
    <header class="auth-page__header">
        <a th:href="@{/auth/welcome}" href="/auth/welcome" class="flex-row gap-24" style="align-items: center;">
            <img class="logo" th:src="@{/static/source/logo_rect.svg}" src="/static/source/logo_rect.svg" alt="TaskPulse">
        </a>
        <a class="text-basic" th:href="@{/auth/login}" href="/auth/login" style="text-decoration: underline;">Уже есть аккаунт — войти</a>
    </header>

    <main class="auth-page__main auth-page__main--split" data-auth-parallax-root>
        <section class="auth-hero auth-hero--compact auth-hero--motif" aria-hidden="true">
            <div class="auth-hero__inner" data-auth-parallax="0.05">
                <p class="auth-hero__eyebrow">Новый аккаунт</p>
                <h1 class="auth-hero__title">
                    <span class="auth-hero__title-line">Соберите</span>
                    <span class="auth-hero__title-line auth-hero__title-line--accent">команду и задачи.</span>
                </h1>
                <p class="auth-hero__lead text-basic">Регистрация — старт проекта: потом подключите проект и приглашения в одном мастере.</p>
                <div class="auth-motif auth-motif--signup">
                    <div class="auth-motif-profile">
                        <div class="auth-motif-profile__card">
                            <div class="auth-motif-profile__header" aria-hidden="true"></div>
                            <div class="auth-motif-profile__row">
                                <div class="auth-motif-profile__avatar" aria-hidden="true"></div>
                                <div class="auth-motif-profile__lines">
                                    <div class="auth-motif-profile__line" aria-hidden="true"></div>
                                    <div class="auth-motif-profile__line auth-motif-profile__line--short" aria-hidden="true"></div>
                                </div>
                            </div>
                        </div>
                        <div class="auth-motif-profile__badge" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <div class="auth-page__panel">
        <div class="modal-content auth-flow-card auth-flow-card--signature">
            <div class="modal-header">
                <p class="text-header">Создание аккаунта</p>
                <a class="modal-close" th:href="@{/auth/welcome}" href="/auth/welcome" aria-label="Закрыть">
                    <img src="/static/source/icons/cross.svg" alt="" width="24" height="24">
                </a>
            </div>
            <div class="modal-body">
                <form class="form-auth" data-static-form action="#" method="post" id="registerForm">
                    <div class="auth-field">
                        <label for="reg-name">Имя и фамилия <img class="required-icon" src="/static/source/icons/required.svg" alt="" aria-hidden="true"></label>
                        <input id="reg-name" name="displayName" type="text" autocomplete="name" placeholder="Иван Иванов" required>
                    </div>
                    <div class="auth-field">
                        <label for="reg-email">Электронная почта <img class="required-icon" src="/static/source/icons/required.svg" alt="" aria-hidden="true"></label>
                        <input id="reg-email" name="email" type="email" autocomplete="email" placeholder="you@company.com" required>
                    </div>
                    <div class="auth-field">
                        <label for="reg-password">Пароль <img class="required-icon" src="/static/source/icons/required.svg" alt="" aria-hidden="true"></label>
                        <input id="reg-password" name="password" type="password" autocomplete="new-password" placeholder="Не менее 8 символов" minlength="8" required>
                    </div>
                    <div class="auth-field">
                        <label for="reg-password2">Повторите пароль <img class="required-icon" src="/static/source/icons/required.svg" alt="" aria-hidden="true"></label>
                        <input id="reg-password2" name="passwordConfirm" type="password" autocomplete="new-password" placeholder="Повторите пароль" required>
                    </div>
                    <label class="checkbox-item" style="margin: 0;">
                        <input type="checkbox" name="terms" required>
                        <span class="custom-checkbox"></span>
                        <span class="checkbox-text">Согласен с <a href="#" class="text-basic" style="text-decoration: underline;">условиями использования</a> и <a href="#" class="text-basic" style="text-decoration: underline;">политикой конфиденциальности</a></span>
                    </label>
                </form>
            </div>
            <div class="modal-footer">
                <a class="button-secondary" th:href="@{/auth/welcome}" href="/auth/welcome">Назад</a>
                <button class="button-basic" type="button" id="registerContinueBtn">Зарегистрироваться</button>
            </div>
        </div>
        </div>
    </main>

    <script th:src="@{/static/js/auth_static.js}" src="/static/js/auth_static.js"></script>
</body>

</html>
