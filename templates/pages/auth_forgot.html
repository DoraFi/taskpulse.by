<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskPulse — Восстановление пароля</title>
    <link rel="icon" type="image/svg+xml" href="/static/source/logo_rect.svg">
    <link rel="stylesheet" href="/static/scss/style.css">
</head>

<body class="auth-page auth-page--form">
    <header class="auth-page__header">
        <a href="/templates/pages/auth_welcome.html" class="flex-row gap-24" style="align-items: center;">
            <img class="logo" src="/static/source/logo_rect.svg" alt="TaskPulse">
        </a>
        <a class="text-basic" href="/templates/pages/auth_login.html" style="text-decoration: underline;">← Ко входу</a>
    </header>

    <main class="auth-page__main auth-page__main--split" data-auth-parallax-root>
        <section class="auth-hero auth-hero--compact auth-hero--motif" aria-hidden="true">
            <div class="auth-hero__inner" data-auth-parallax="0.05">
                <p class="auth-hero__eyebrow">Сброс доступа</p>
                <h1 class="auth-hero__title">
                    <span class="auth-hero__title-line">Защищённый сброс</span>
                    <span class="auth-hero__title-line auth-hero__title-line--accent">по ссылке из письма.</span>
                </h1>
                <p class="auth-hero__lead text-basic">Укажите email — отправим одноразовую ссылку: перейдите по ней и задайте новый пароль.</p>
                <div class="auth-motif auth-motif--recover" >
                    <svg class="auth-motif-shield-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" transform="scale(0.8)">
                        <g class="auth-motif-shield-svg__rings" fill="none" stroke="currentColor" stroke-linecap="round"
                            transform="translate(60 58) scale(0.92) translate(-100 -58)">
                            <circle cx="100" cy="58" r="52" stroke-width="1" stroke-opacity="0.14"></circle>
                            <circle cx="100" cy="58" r="62" stroke-width="0.85" stroke-opacity="0.1"></circle>
                        </g>
                        <g transform="translate(60 58) scale(0.88) translate(-100 -58)">
                            <path class="auth-motif-shield-svg__shield" fill="none" stroke="currentColor" stroke-width="2.15"
                                stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.5"
                                d="M 100 18 C 118 18 134 28 134 38 L 134 64 C 134 84 100 106 100 106 C 100 106 66 84 66 64 L 66 38 C 66 28 82 18 100 18 Z">
                            </path>
                        </g>
                        <g transform="translate(60 58) scale(0.7) translate(-100 -58)">
                            <path class="auth-motif-shield-svg__check" fill="none" stroke="currentColor" stroke-width="2.9"
                                stroke-linecap="round" stroke-linejoin="round" d="M 84 58 L 96 72 L 122 44"></path>
                        </g>
                    </svg>
                </div>
            </div>
        </section>

        <div class="auth-page__panel">
        <div class="modal-content auth-flow-card auth-flow-card--signature">
            <div class="modal-header">
                <p class="text-header">Восстановление пароля</p>
                <a class="modal-close" href="/templates/pages/auth_login.html" aria-label="Закрыть">
                    <img src="/static/source/icons/cross.svg" alt="" width="24" height="24">
                </a>
            </div>
            <div class="modal-body">
                <p class="text-basic" style="margin: 0;">Укажите email — отправим ссылку для сброса пароля.</p>
                <form class="form-auth" data-static-form action="#" method="post">
                    <div class="auth-field">
                        <label for="forgot-email">Электронная почта <img class="required-icon" src="/static/source/icons/required.svg" alt="" aria-hidden="true"></label>
                        <input id="forgot-email" name="email" type="email" autocomplete="email" placeholder="you@company.com" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <a class="button-secondary" href="/templates/pages/auth_login.html">Отмена</a>
                <button type="button" class="button-basic" id="forgot-submit-btn">Отправить ссылку</button>
            </div>
        </div>
        </div>
    </main>

    <script src="/static/js/auth_static.js"></script>
</body>

</html>
