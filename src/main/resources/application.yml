server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:taskpulse}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:655650}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  thymeleaf:
    prefix: file:./templates/
    suffix: .html
    mode: HTML
    cache: false
  web:
    resources:
      static-locations: file:./static/
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    org.hibernate.SQL: info
